<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Leave History</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="margin: 0;">
    <div class="dashboard-layout">

        <aside class="sidebar">
            <h2></h2>
            <button id="btnPending" class="btn-outline">Pending Leaves</button>
            <button id="btnApproved" class="btn-outline">Approved Leaves</button>
            <button id="btnRejected" class="btn-outline">Rejected Leaves</button>
            <button class="btn-primary" style="cursor: default;">Employee History</button>

            <div style="flex-grow: 1;"></div>
            <button id="logoutBtn" class="btn-danger">Logout</button>
        </aside>

        <main class="main-content">
            <div class="card card-wide">
                <h1>Employee Leave History</h1>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Total Leaves</th>
                                <th>Leaves Taken</th>
                                <th>Remaining Leaves</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTable">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="employee-history.js"></script>
</body>
</html>
