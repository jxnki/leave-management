<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="margin: 0;"> <div class="dashboard-layout">
        
        <aside class="sidebar">
            <h2></h2>
            
            <button class="btn-primary" style="cursor: default;">Dashboard</button>
            <button id="applyBtn" class="btn-outline">Apply for Leave</button>
            <button id="historyBtn" class="btn-outline">View My Leaves</button>
            
            <div style="flex-grow: 1;"></div> 
            
            <button id="logoutBtn" class="btn-danger">Logout</button>
        </aside>

        <main class="main-content">
            <h1 id="welcomeMessage">Welcome, Employee</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="totalLeaves">Total Leaves: -</h3>
                </div>
                <div class="stat-card">
                    <h3 id="leavesTaken">Leaves Taken: -</h3>
                </div>
                <div class="stat-card">
                    <h3 id="remainingLeaves">Remaining Leaves: -</h3>
                </div>
            </div>

            <div class="dashboard-widgets">
                
                <div class="card" style="flex: 1; min-width: 250px; max-width: 320px; padding: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; color: var(--text-main); font-size: 1.1rem;">Leave Breakdown</h3>
                    
                    <div style="max-width: 350px; margin: 0 auto;">
                        <canvas id="employeeChart"></canvas>
                    </div>
                </div>

                <div class="card" style="flex: 2; min-width: 350px; padding: 1.5rem;">
                    <div class="calendar-header" style="margin-bottom: 1rem;">
                        <button id="prevMonth" class="btn-outline" style="padding: 0.3rem 0.8rem;">&lt;</button>
                        <h3 id="monthYearText" style="color: var(--text-main); margin: 0; font-size: 1.1rem;">Month Year</h3>
                        <button id="nextMonth" class="btn-outline" style="padding: 0.3rem 0.8rem;">&gt;</button>
                    </div>
                    
                    <div class="calendar-weekdays">
                        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                    </div>
                    
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>

            </div>
        </main>

    </div>

    <script src="employee.js"></script>
</body>
</html>
