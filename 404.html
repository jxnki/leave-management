<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | SyncLeave</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-image: url('bg.png'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

    <div class="card" style="margin: 0 auto;">
        <h1>404 - Page Not Found</h1>
        <p style="margin-bottom: 1.25rem;">The page you're looking for doesn't exist or the link is incorrect.</p>

        <button id="homeBtn" class="btn-primary">Go to Home</button>
    </div>

    <script>
        document.getElementById("homeBtn").addEventListener("click", () => {
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
