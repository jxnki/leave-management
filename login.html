<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncLeave | Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-image: url('bg.png'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

    <a class="top-left-link" href="index.html">&larr; Back</a>

    <div class="center-wrapper">
        <div class="card">

            <h1 id="pageTitle">System Login</h1>

            <form id="loginForm">

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" id="toggleLoginPassword" class="toggle-password-btn">👁️</button>
                    </div>
                </div>

                <button type="button" id="loginBtn" class="btn-primary">Login</button>

                <div style="margin-top: 1rem;">
                    <button type="button" id="registerBtn" class="btn-outline">Register</button>
                </div>

                <p id="message" style="margin-top: 0.75rem;"></p>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
