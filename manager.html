<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="margin: 0;">
    <div class="dashboard-layout">
        
        <aside class="sidebar">
            <h2></h2>
            <button id="btnPending" class="btn-primary">Pending Leaves</button>
            <button id="btnApproved" class="btn-outline">Approved Leaves</button>
            <button id="btnRejected" class="btn-outline">Rejected Leaves</button>
            
            <div style="flex-grow: 1;"></div>
            <button id="logoutBtn" class="btn-danger">Logout</button>
        </aside>

        <main class="main-content">
            <div class="card card-wide">
                <h1 id="tableTitle">Pending Leave Requests</h1>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Req ID</th>
                                <th>Emp ID</th>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Reason</th>
                                <th>Start Date</th>
                                <th>End Date</th>
                                <th>Status</th>
                                <th id="actionHeader">Action</th>
                            </tr>
                        </thead>
                        <tbody id="leaveTable">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="manager.js"></script>
</body>
</html>
